; Blueprint Serializer Plugin Default User Configuration
; Users can override these settings in their project's Config/DefaultBlueprintSerializer.ini

[/Script/BlueprintSerializer.BlueprintSerializerSettings]
; Export Settings
; ExportMode: ProjectSaved, EngineSaved, Documents, Temporary, Custom
ExportMode=ProjectSaved

; Serialization Settings
; SerializationDepth: Minimal, Standard, Extended, Complete
SerializationDepth=Extended
bPrettyPrintJson=True
bIncludeStructuredGraphs=True

; AI/LLM Integration
bGenerateLLMContext=False
ContextTemplateName="CodeGen_CPP"

; Workflow Settings
bShowExportNotifications=True
bAutoValidateJson=True

; Performance Settings
MaxNodesPerBlueprint=5000
bEnableParallelProcessing=True
MemoryLimitMB=1024